<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fahril — Project Developer</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0c0c10;
      --surface: #13131a;
      --border: rgba(255,255,255,0.07);
      --accent: #7c5cfc;
      --accent2: #fc5c7d;
      --text: #e8e4f0;
      --muted: #6b6680;
    }

    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,92,252,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,92,252,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.18;
      z-index: 0;
      animation: floatBlob 8s ease-in-out infinite;
    }
    .blob-1 {
      width: 400px; height: 400px;
      background: var(--accent);
      top: -100px; left: -100px;
    }
    .blob-2 {
      width: 300px; height: 300px;
      background: var(--accent2);
      bottom: -80px; right: -80px;
      animation-delay: 3s;
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 20px); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 48px 44px;
      max-width: 460px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(124,92,252,0.08), 0 40px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .avatar-wrap {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 24px;
    }
    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      position: relative;
      z-index: 1;
      object-fit: cover;
    }
    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--accent), var(--accent2), var(--accent));
      z-index: 0;
      animation: spinRing 4s linear infinite;
    }
    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--surface);
    }
    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,92,252,0.12);
      border: 1px solid rgba(124,92,252,0.25);
      border-radius: 99px;
      padding: 4px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .role {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .role span { color: var(--accent2); }

    .bio {
      font-size: 14px;
      color: #9991b0;
      line-height: 1.7;
      margin-bottom: 32px;
      padding: 0 8px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 28px;
    }

    .social-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .social-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: 60px;
      width: 60px;
      padding: 20px;
      border-radius: 50px;
      text-decoration: none;
      color: #9d8dbb;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }

    .social-btn:hover {
      width: 180px;
      color: #ffffff;
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }

    .social-btn svg {
      min-width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .social-btn span {
      margin-left: 12px;
      white-space: nowrap;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .social-btn:hover span { opacity: 1; }

    .footer {
      margin-top: 28px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .footer span { color: var(--accent2); }
  </style>
</head>
